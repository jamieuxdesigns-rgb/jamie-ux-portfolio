      Jamie.UXDesigns
    </a>

    <!-- Mobile hamburger -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Nav links -->
    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link pulse-glow" href="index.html">Home</a>

          <a class="nav-link pulse-glow" href="contact.html">Contact</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Contact Section -->
<div class="container text-center py-5">
  <!-- Force stacking on mobile -->
  <div class="row align-items-start flex-column flex-md-row">

    <!-- Left Column: Flip Card / Video -->
<div class="col-12 col-md-6 d-flex justify-content-center align-items-center mb-4 mb-md-0">
<div class="flip-card-wrapper">
  <div class="flip-card-inner">
    <!-- Front: GIF -->
    <img class="flip-front" src="images/contact2.gif" alt="Front GIF">

    <!-- Back: image -->
    <img class="flip-back" src="images/contact1.gif" alt="Back image">
  </div>
</div>
</div>

    <!-- Right Column: Form -->
    <div class="col-12 col-md-6">
      <h2 class="contact-title">Let's Work Together</h2>
      <p class="contact-sub">
        Have a project, collaboration, or question? Send me a message and I'll get back to you soon.
      </p>

      <form action="https://formspree.io/f/xeelewqg" method="POST" class="contact-form">
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input id="name" type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input id="email" type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="message" class="form-label">Message</label>
          <textarea id="message" name="message" rows="4" class="form-control" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary glow-btn">Send Message</button>
      </form>
    </div>

  </div>
</div>

<!-- Footer -->
<footer class="footer-nav">
  <div class="section-inner">
    <img src="images/logo.png" alt="Jamie Logo" class="footer-logo">
    <div class="footer-buttons">
      <a href="contact.html" class="footer-link">Email Me</a>
      <a href="tel:+11234567890" 
         onclick="if(!/Mobi|Android/i.test(navigator.userAgent)){ this.href='contact.html'; }" 
         class="footer-link">Call Me</a>
      <a href="https://linkedin.com" target="_blank" class="footer-link">LinkedIn</a>
      <a href="#projects" class="footer-link">View Case Studies</a>
      <a href="assets/resume.docx" download class="footer-link">Download Resume</a>
    </div>
    <medium>Designed with accessibility and clarity in mind.</medium>
  </div>
</footer>
